name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # inkex 1.4.1 matches modern Inkscape and is correct under numpy 2.x.
        # It is installed --no-deps because its declared deps include PyGObject,
        # a GUI library this extension never uses and which has no Linux wheel
        # (building it needs system cairo/girepository). We add only the
        # libraries inkex's import chain and our code actually touch. At runtime
        # the extension uses Inkscape's bundled inkex.
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-deps "inkex==1.4.1"
          python -m pip install lxml cssselect numpy tinycss2 pytest

      - name: Validate INX is well-formed XML
        run: python -c "import xml.etree.ElementTree as ET; ET.parse('thin_line_detector.inx')"

      - name: Byte-compile sources
        run: python -m compileall -q thin_line_detector.py install.py

      - name: Run tests
        run: python -m pytest -q
